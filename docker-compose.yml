services:
  hermes-vnc:
    build: .
    container_name: hermes-vnc
    restart: unless-stopped
    ports:
      - "0.0.0.0:6080:6080"   # noVNC — access from browser: http://YOUR_IP:6080/vnc.html
      - "127.0.0.1:5900:5900"  # VNC direct (localhost only for security)
    volumes:
      # Persistent Chromium profile: cookies, sessions, and logins survive container restarts.
      # Create this folder first: mkdir -p /opt/data/chromium-profile
      - /opt/data/chromium-profile:/chromium-profile
    networks:
      - hermes_default   # must be the same network as your Hermes container
    shm_size: '256mb'    # Chromium needs extra shared memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  hermes_default:
    external: true   # this network is created by the Hermes docker-compose
